<!doctype html>
<html lang="uk">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Увійти — CyberField NeT</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Volkhov:wght@400;700&family=Poppins:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/variables.css" />
  <link rel="stylesheet" href="../css/base.css" />
  <link rel="stylesheet" href="../css/layout.css" />
  <link rel="stylesheet" href="../css/components.css" />
  <link rel="stylesheet" href="../css/sections.css" />
  <style>
    /* ── Auth page layout ── */
    body { background: var(--violet-50); min-height: 100vh; display: flex; flex-direction: column; }
    main { flex: 1; display: flex; align-items: center; justify-content: center; padding: 48px 24px; }

    .authCard {
      background: #fff;
      border: 1.5px solid var(--line);
      border-radius: var(--radius2);
      padding: 48px 44px;
      width: 100%;
      max-width: 460px;
      box-shadow: var(--shadow2);
    }
    @media (max-width: 520px) { .authCard { padding: 36px 24px; } }

    .authLogo {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      margin-bottom: 32px;
    }
    .authLogoIcon {
      width: 60px; height: 60px;
      border-radius: 16px;
      background: #0b0f1a;
      display: flex; align-items: center; justify-content: center;
      box-shadow: var(--shadow2);
      margin-bottom: 14px;
    }
    .authLogo h1 {
      font-size: 22px;
      letter-spacing: -0.04em;
      margin-bottom: 4px;
    }
    .authLogo p {
      font-family: var(--fontBody);
      font-size: 15px;
      color: var(--c-text3);
      margin: 0;
    }

    .authTitle {
      font-size: 26px;
      letter-spacing: -0.03em;
      margin-bottom: 6px;
      text-align: center;
    }
    .authSubtitle {
      font-family: var(--fontBody);
      font-size: 15px;
      color: var(--c-text3);
      text-align: center;
      margin-bottom: 30px;
    }

    /* ── Form fields ── */
    .formGroup { margin-bottom: 18px; }
    .formGroup label {
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-family: var(--fontUI);
      font-size: 14px;
      font-weight: 500;
      color: var(--c-text2);
      margin-bottom: 7px;
    }
    .formGroup label a {
      font-size: 13px;
      color: var(--violet-600);
    }
    .formGroup label a:hover { text-decoration: underline; }

    .inputWrap { position: relative; }
    .formGroup input {
      width: 100%;
      font-family: var(--fontBody);
      font-size: 16px;
      color: var(--text);
      background: var(--violet-50);
      border: 1.5px solid var(--line);
      border-radius: var(--radius3);
      padding: 12px 44px 12px 16px;
      outline: none;
      transition: border-color .18s, box-shadow .18s, background .18s;
    }
    .formGroup input::placeholder { color: var(--c-text4); }
    .formGroup input:focus {
      border-color: var(--violet-500);
      background: #fff;
      box-shadow: 0 0 0 3px rgba(108,92,231,.12);
    }
    .inputIcon {
      position: absolute;
      right: 14px; top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
      cursor: pointer;
      display: flex;
      align-items: center;
    }



    .authSubmit .btn { width: 100%; padding: 14px; font-size: 17px; }





    /* ── Footer link ── */
    .authFooterLink {
      text-align: center;
      margin-top: 24px;
      font-family: var(--fontBody);
      font-size: 14px;
      color: var(--c-text3);
    }
    .authFooterLink a { color: var(--violet-600); font-weight: 500; }
    .authFooterLink a:hover { text-decoration: underline; }

    /* ── Error ── */
    .fieldError {
      font-family: var(--fontBody);
      font-size: 13px;
      color: #e17055;
      margin-top: 5px;
      display: none;
    }
    .formGroup.hasError input { border-color: #e17055; }
    .formGroup.hasError .fieldError { display: block; }
  </style>
</head>
<body>

  <!-- Minimal nav for auth pages -->
  <header class="nav">
    <div class="container">
      <div class="navRow">
        <a class="brand" href="../index.html" aria-label="CyberField NeT">
          <div class="brandLogo">
            <img src="/assets/images/logo.png" alt="logo" width="44" height="44" style="border-radius:8px;object-fit:contain;">
          </div>
          <div class="brandName">
            <strong>CyberField NeT</strong>
            <span>Онлайн-курси IT-профессій</span>
          </div>
        </a>
        <div class="navActions">
          <a class="btn btn-outline" href="register.html">Реєстрація</a>
        </div>
      </div>
    </div>
  </header>

  <main>
    <div class="authCard">

      <div class="authLogo">
        <div class="authLogoIcon">
          <img src="/assets/images/logo.png" alt="logo" width="36" height="36" style="border-radius:6px;object-fit:contain;">
        </div>
        <h1>CyberField NeT</h1>
        <p>Онлайн-курси IT-профессій</p>
      </div>

      <h2 class="authTitle">Вхід в акаунт</h2>
      <p class="authSubtitle">Введи свій email і пароль для входу</p>

      <form id="loginForm" novalidate>

        <div class="formGroup" id="emailGroup">
          <label for="email">Email</label>
          <div class="inputWrap">
            <input type="email" id="email" name="email" placeholder="you@example.com" autocomplete="email" required>
            <span class="inputIcon" aria-hidden="true">
              <svg width="18" height="18" viewBox="0 0 18 18" fill="none"><rect x="2" y="4" width="14" height="10" rx="2" stroke="currentColor" stroke-width="1.6"/><polyline points="2,4 9,10 16,4" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/></svg>
            </span>
          </div>
          <p class="fieldError" id="emailErr">Введи коректний email</p>
        </div>

        <div class="formGroup" id="passGroup">
          <label for="password">
            Пароль
            <a href="#" onclick="return false">Забув пароль?</a>
          </label>
          <div class="inputWrap">
            <input type="password" id="password" name="password" placeholder="••••••••" autocomplete="current-password" required>
            <span class="inputIcon" id="togglePass" role="button" tabindex="0" aria-label="Показати пароль" onclick="togglePassword()">
              <svg id="eyeIcon" width="18" height="18" viewBox="0 0 18 18" fill="none"><ellipse cx="9" cy="9" rx="7" ry="4" stroke="currentColor" stroke-width="1.6"/><circle cx="9" cy="9" r="2" stroke="currentColor" stroke-width="1.6"/></svg>
            </span>
          </div>
          <p class="fieldError" id="passErr">Введи пароль</p>
        </div>

        <div class="authSubmit">
          <button type="submit" class="btn btn-primary">Увійти</button>
        </div>

      </form>



      <p class="authFooterLink">Ще немає акаунту? <a href="register.html">Зареєструватись</a></p>

    </div>
  </main>

  <script>
    function togglePassword() {
      const input = document.getElementById('password');
      input.type = input.type === 'password' ? 'text' : 'password';
    }

    const API = 'http://localhost:3000/api';

    document.getElementById('loginForm').addEventListener('submit', async function(e) {
      e.preventDefault();

      const email = document.getElementById('email').value.trim();
      const pass  = document.getElementById('password').value;

      const emailGroup = document.getElementById('emailGroup');
      const passGroup  = document.getElementById('passGroup');
      emailGroup.classList.remove('hasError');
      passGroup.classList.remove('hasError');

      let valid = true;
      if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
        emailGroup.classList.add('hasError');
        valid = false;
      }
      if (!pass) {
        passGroup.classList.add('hasError');
        valid = false;
      }
      if (!valid) return;

      const submitBtn = this.querySelector('button[type="submit"]');
      submitBtn.textContent = 'Завантаження...';
      submitBtn.disabled = true;

      try {
        const res = await fetch(`${API}/auth/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          credentials: 'include', // send/receive cookies
          body: JSON.stringify({ email, password: pass }),
        });

        const data = await res.json();

        if (!res.ok) {
          // Show server error under email field
          document.getElementById('emailErr').textContent =
            data.error || 'Невірний email або пароль';
          emailGroup.classList.add('hasError');
          return;
        }

        // Save token in localStorage as backup
        localStorage.setItem('token', data.token);
        localStorage.setItem('user', JSON.stringify(data.user));

        // Redirect to main page
        window.location.href = '../index.html';

      } catch (err) {
        document.getElementById('emailErr').textContent = 'Помилка з\'єднання з сервером';
        emailGroup.classList.add('hasError');
      } finally {
        submitBtn.textContent = 'Увійти';
        submitBtn.disabled = false;
      }
    });
  </script>

</body>
</html>
